<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ફોટો બનાવો – શ્રી માધવલાલ શાહ હાઈસ્કૂલ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anek+Gujarati:wght@100..800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Noto Sans Gujarati', 'Poppins', sans-serif;
      --purple:    #6b21a8;
      --purple-d:  #4c1d95;
      --purple-m:  #7c3aed;
      --purple-l:  #ede9fe;
      --brown:     #92400e;
      --brown-mid: #b45309;
      --brown-l:   #fef3c7;
      --white:     #ffffff;
      --gray-50:   #f9fafb;
      --gray-100:  #f3f4f6;
      --gray-200:  #e5e7eb;
      --gray-500:  #6b7280;
      --gray-700:  #374151;
      --gray-900:  #111827;
    }

    body {
      font-family: var(--font);
      background: var(--gray-50);
      min-height: 100vh;
      overflow-x: hidden; /* Prevent horizontal scroll on small screens */
    }

    /* ── NAVBAR ── */
    .navbar {
      background: #ffffff;
      border-bottom: 2px solid var(--purple-l);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(109,40,217,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar img {
      width: 52px; height: 52px;
      object-fit: contain;
      border-radius: 50%;
    }
    .navbar-text { display: flex; flex-direction: column; }
    .navbar-sub {
      font-size: clamp(9px, 2.2vw, 11px);
      color: var(--gray-500);
      font-weight: 400;
    }
    .navbar-title {
      font-size: clamp(13px, 3.8vw, 19px);
      font-weight: 700;
      color: var(--purple-d);
      line-height: 1.25;
    }

    /* ── PAGE WRAPPER ── */
    .main {
      max-width: 500px;
      margin: 32px auto;
      padding: 0 16px 60px;
    }

    /* ── FORM CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .card-title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--purple-d);
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--purple-l);
    }

    /* ── LABELS & INPUTS ── */
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
      margin-top: 18px;
    }
    .field-label:first-of-type { margin-top: 0; }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--purple-m); }
    input[type="text"]::placeholder { color: #9ca3af; }

    /* ── FILE UPLOAD ── */
    #imageInput { display: none; }
    .file-label {
      display: flex;
      align-items: center;
      justify-content: center; /* Center the icon and text */
      gap: 10px;
      padding: 12px 14px;
      background: var(--gray-50);
      border: 1.5px dashed var(--gray-200);
      border-radius: 10px;
      cursor: pointer;
      color: var(--purple-m);
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s;
    }
    .file-label:hover {
      background: var(--purple-l);
      border-color: var(--purple-m);
    }
    #fileName {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 5px;
      text-align: center; /* Center the selected file name */
    }

    /* ── PHOTO PREVIEW ── */
    .preview-wrap {
      display: none;
      justify-content: center;
      margin-top: 14px;
    }
    .preview-wrap img {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--brown-mid);
      box-shadow: 0 4px 14px rgba(146,64,14,0.22);
    }

    /* ── GENERATE BUTTON ── */
    .btn-generate {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple-d), var(--purple-m));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(109,40,217,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(109,40,217,0.38);
    }
    .btn-generate:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── LOADING ── */
    .loading {
      display: none;
      text-align: center;
      color: var(--purple-m);
      font-size: 14px;
      font-weight: 600;
      margin-top: 14px;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--purple-l);
      border-top-color: var(--purple-m);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULT ── */
    .result-section { display: none; margin-top: 26px; }
    .result-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #15803d;
      margin-bottom: 12px;
    }
    .result-img-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
      box-shadow: 0 6px 28px rgba(0,0,0,0.10);
    }
    .result-img-wrap img { width: 100%; display: block; }

    .btn-download {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: linear-gradient(135deg, #15803d, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(22,163,74,0.30);
      transition: transform 0.15s;
    }
    .btn-download:hover { transform: translateY(-2px); }

    canvas { display: none; }

    /* ── RESPONSIVE DESIGN FOR MOBILE ── */
    @media (max-width: 480px) {
      .main {
        margin: 16px auto;
        padding: 0 12px 40px;
      }
      .card {
        padding: 20px 16px;
        border-radius: 16px;
      }
      .navbar {
        padding: 10px 12px;
        gap: 10px;
      }
      .navbar img {
        width: 44px; height: 44px;
      }
      input[type="text"] {
        padding: 10px 12px;
        font-size: 14px;
      }
      .btn-generate, .btn-download {
        padding: 12px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
  <div class="navbar-text">
    <span class="navbar-sub">ધી કેમ્બે એજ્યુકેશન સોસાયટી સંચાલિત</span>
    <span class="navbar-title">શ્રી માધવલાલ શાહ હાઈસ્કૂલ, ખંભાત</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="card">
    <p class="card-title">🎓 તમારો પ્રવેશ ફોટો બનાવો</p>

    <label class="field-label">તમારું નામ (ગુજરાતી અથવા English)</label>
    <input id="name" type="text" placeholder="તમારું નામ અહીં લખો...">

    <label class="field-label">તમારો ફોટો પસંદ કરો</label>
    <label class="file-label" for="imageInput">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      ફોટો અપલોડ કરો (JPG / PNG)
    </label>
    <input id="imageInput" type="file" accept="image/*">
    <div id="fileName">કોઈ ફોટો પસંદ નથી</div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview">
    </div>

    <button class="btn-generate" onclick="generatePoster()">✨ ફોટો બનાવો</button>
    <div class="loading" id="loading">ફોટો બનાવી રહ્યા છે... <span class="spinner"></span></div>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="resultSection">
    <p class="result-title">✅ ફોટો તૈયાર છે!</p>
    <div class="result-img-wrap">
      <img id="resultImg" src="" alt="Generated Poster">
    </div>
    <a id="downloadLink" class="btn-download" download="madhavlal-photo.png">⬇️ ડાઉનલોડ કરો</a>
  </div>
</div>

<canvas id="canvas" width="1080" height="1350"></canvas>

<script>
/*
 * Pixel-calibrated values for bg.jpg (1080×1350):
 *
 * Available photo area: y=435 (after school strip) → y=1050 (before contact)
 * Left column: cx≈240
 *
 * Original circle: cx=250, cy≈647, r≈140  (scanned from poster)
 * Updated (per user): move photo DOWN + increase size
 *   cx=240, cy=710, r=195
 *   Circle top:  710-195 = 515  ✓ (well below strip at y=435)
 *   Circle bottom: 710+195 = 905
 *   Name at: y=960
 *   Space before contact (y≈1050): 90px ✓
 *
 * Ring: BROWN border (no glow/glass)
 */
const PHOTO_CX = 240;
const PHOTO_CY = 710;   // moved down from 650
const PHOTO_R  = 195;
const NAME_X   = 240;
const NAME_Y   = 965;

// Brown ring colors
const RING_OUTER_COLOR  = "#92400e";   // dark brown
const RING_INNER_COLOR  = "#d97706";   // amber/gold-brown
const RING_OUTER_WIDTH  = 10;
const RING_INNER_WIDTH  = 4;

// ── File preview ────────────────────────────────────────────────────────────
document.getElementById("imageInput").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
  document.getElementById("fileName").textContent = "📎 " + file.name;
  const r = new FileReader();
  r.onload = e => {
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("previewWrap").style.display = "flex";
  };
  r.readAsDataURL(file);
});

// ── Generate ─────────────────────────────────────────────────────────────────
function generatePoster() {
  const name = document.getElementById("name").value.trim();
  const file = document.getElementById("imageInput").files[0];
  if (!name) { alert("કૃપા કરી નામ લખો ✏️"); return; }
  if (!file)  { alert("કૃપા કરી ફોટો પસંદ કરો 📷"); return; }
  if (file.size > 5 * 1024 * 1024) { alert("ફોટો 5MB થી નાનો હોવો જોઈએ"); return; }

  const btn     = document.querySelector(".btn-generate");
  const loading = document.getElementById("loading");
  btn.disabled  = true;
  loading.style.display = "block";

  const reader = new FileReader();
  reader.onload = e => loadGujaratiFontThenDraw(name, e.target.result, btn, loading);
  reader.readAsDataURL(file);
}

// ── Load Gujarati font into canvas ───────────────────────────────────────────
function loadGujaratiFontThenDraw(name, imgSrc, btn, loading) {
  const face = new FontFace(
    "CanvasGuj",
    "url(https://fonts.gstatic.com/s/notosansgujarati/v28/wlpWgx_HC1ti5ViekvcxnhMlCVo3f5pv.woff2)",
    { weight: "700" }
  );
  face.load()
    .then(f => document.fonts.add(f))
    .catch(() => {/* silent fallback */})
    .finally(() => drawPoster(name, imgSrc, btn, loading));
}

// ── Core canvas draw ──────────────────────────────────────────────────────────
function drawPoster(name, userImgSrc, btn, loading) {
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");

  const bg      = new Image();
  const userImg = new Image();
  let loaded    = 0;

  function tryDraw() {
    if (++loaded < 2) return;

    ctx.clearRect(0, 0, 1080, 1350);

    // 1 — Background
    if (bg.naturalWidth > 0) {
      ctx.drawImage(bg, 0, 0, 1080, 1350);
    } else {
      ctx.fillStyle = "#f8f5ff";
      ctx.fillRect(0, 0, 1080, 1350);
    }

    const cx = PHOTO_CX;
    const cy = PHOTO_CY;
    const r  = PHOTO_R;

    // 2 — Circular user photo (object-fit: cover)
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();

    const iw   = userImg.naturalWidth  || userImg.width  || 1;
    const ih   = userImg.naturalHeight || userImg.height || 1;
    const side = Math.min(iw, ih);
    const sx   = (iw - side) / 2;
    const sy   = (ih - side) / 2;
    ctx.drawImage(userImg, sx, sy, side, side, cx - r, cy - r, r * 2, r * 2);
    ctx.restore();

    // 3 — Brown outer ring (solid, no glow)
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r + RING_OUTER_WIDTH / 2 + 2, 0, Math.PI * 2);
    ctx.strokeStyle = RING_OUTER_COLOR;
    ctx.lineWidth   = RING_OUTER_WIDTH;
    ctx.stroke();
    ctx.restore();

    // 4 — Thin amber inner accent ring
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r + RING_OUTER_WIDTH + RING_INNER_WIDTH / 2 + 1, 0, Math.PI * 2);
    ctx.strokeStyle = RING_INNER_COLOR;
    ctx.lineWidth   = RING_INNER_WIDTH;
    ctx.stroke();
    ctx.restore();

    // 5 — Name text
    ctx.save();
    ctx.textAlign    = "center";
    ctx.textBaseline = "middle";

    let fontSize = 62;
    const maxW   = 420;
    const setFont = () => {
      ctx.font = `bold ${fontSize}px "CanvasGuj","Noto Sans Gujarati","Mukta",sans-serif`;
    };
    setFont();
    while (ctx.measureText(name).width > maxW && fontSize > 24) {
      fontSize -= 2;
      setFont();
    }

    ctx.fillStyle = "#111111";
    ctx.fillText(name, NAME_X, NAME_Y);
    ctx.restore();

    // 6 — Export
    finalize(canvas, btn, loading);
  }

  bg.onload  = tryDraw;
  bg.onerror = tryDraw;
  userImg.onload  = tryDraw;
  userImg.onerror = () => {
    btn.disabled = false;
    loading.style.display = "none";
    alert("ફોટો લોડ ન થઈ શક્યો. ફરી પ્રયાસ કરો.");
  };

  bg.crossOrigin      = "anonymous";
  userImg.crossOrigin = "anonymous";
  bg.src              = "images/bg.jpg";
  userImg.src         = userImgSrc;
}

function finalize(canvas, btn, loading) {
  btn.disabled          = false;
  loading.style.display = "none";
  try {
    const url = canvas.toDataURL("image/png");
    document.getElementById("resultImg").src     = url;
    document.getElementById("downloadLink").href = url;
    const rs = document.getElementById("resultSection");
    rs.style.display = "block";
    rs.scrollIntoView({ behavior: "smooth" });
  } catch (err) {
    console.error(err);
    alert("Download error — VS Code Live Server વાપરો.");
  }
}
</script>

</body>
</html>
